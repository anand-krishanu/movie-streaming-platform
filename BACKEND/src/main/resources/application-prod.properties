# Production Configuration
# Use this profile in production: java -Dspring.profiles.active=prod -jar app.jar

# Reduce log verbosity to WARN/ERROR only
logging.level.root=WARN
logging.level.com.anand.backend=INFO
logging.level.org.springframework=WARN
logging.level.org.mongodb=WARN

# Disable debug endpoints
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true

# Set strict JWT secret requirement (no default!)
jwt.secret=${JWT_SECRET}

# Ensure environment variables are set
spring.data.mongodb.uri=${MONGODB_URI}
video.upload.dir=${VIDEO_UPLOAD_DIR}
video.processed.dir=${VIDEO_PROCESSED_DIR}

# Redis configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}

# ML Service
ml.service.url=${ML_SERVICE_URL}
