name: Build and Push Docker Images

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build and Push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./BACKEND
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/movie-streaming-backend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/movie-streaming-backend:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/movie-streaming-backend:latest
        cache-to: type=inline
    
    - name: Build and Push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./FRONTEND
        file: ./FRONTEND/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/movie-streaming-frontend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/movie-streaming-frontend:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/movie-streaming-frontend:latest
        cache-to: type=inline
    
    - name: Build and Push ML Service
      uses: docker/build-push-action@v5
      with:
        context: ./ml-service
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/movie-streaming-ml-service:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/movie-streaming-ml-service:${{ github.sha }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/movie-streaming-ml-service:latest
        cache-to: type=inline
    
    - name: Image digest
      run: echo "Images pushed successfully! 🎉"
