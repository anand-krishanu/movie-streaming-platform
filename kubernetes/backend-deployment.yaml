apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: movie-platform
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: movie-streaming-platform-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MONGODB_URI
        - name: SPRING_DATA_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: SPRING_DATA_REDIS_HOST
        - name: SPRING_DATA_REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: SPRING_DATA_REDIS_PORT
        - name: ML_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: ML_SERVICE_URL
        - name: VIDEO_UPLOAD_DIR
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: VIDEO_UPLOAD_DIR
        - name: VIDEO_PROCESSED_DIR
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: VIDEO_PROCESSED_DIR
        - name: JWT_SECRET
          value: "your-super-secret-256-bit-key-change-this-before-deployment"
        # Firebase credentials from Secret (create separately)
        - name: FIREBASE_TYPE
          valueFrom:
            secretKeyRef:
              name: firebase-secrets
              key: type
              optional: true
        - name: FIREBASE_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: firebase-secrets
              key: project_id
              optional: true
        - name: FIREBASE_PRIVATE_KEY_ID
          valueFrom:
            secretKeyRef:
              name: firebase-secrets
              key: private_key_id
              optional: true
        - name: FIREBASE_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: firebase-secrets
              key: private_key
              optional: true
        - name: FIREBASE_CLIENT_EMAIL
          valueFrom:
            secretKeyRef:
              name: firebase-secrets
              key: client_email
              optional: true
        - name: FIREBASE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: firebase-secrets
              key: client_id
              optional: true
        - name: FIREBASE_AUTH_URI
          valueFrom:
            secretKeyRef:
              name: firebase-secrets
              key: auth_uri
              optional: true
        - name: FIREBASE_TOKEN_URI
          valueFrom:
            secretKeyRef:
              name: firebase-secrets
              key: token_uri
              optional: true
        - name: FIREBASE_AUTH_PROVIDER_X509_CERT_URL
          valueFrom:
            secretKeyRef:
              name: firebase-secrets
              key: auth_provider_x509_cert_url
              optional: true
        - name: FIREBASE_CLIENT_X509_CERT_URL
          valueFrom:
            secretKeyRef:
              name: firebase-secrets
              key: client_x509_cert_url
              optional: true
        - name: FIREBASE_UNIVERSE_DOMAIN
          valueFrom:
            secretKeyRef:
              name: firebase-secrets
              key: universe_domain
              optional: true
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: movie-platform
spec:
  selector:
    app: backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: LoadBalancer
