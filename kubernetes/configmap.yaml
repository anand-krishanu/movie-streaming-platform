apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: movie-platform
data:
  # MongoDB Configuration (using host machine MongoDB)
  # Note: Using host IP address to access MongoDB from Minikube pods
  MONGODB_URI: "mongodb://192.168.1.205:27017/moviestreamingdb"
  MONGO_URI: "mongodb://192.168.1.205:27017"
  MONGO_DB_NAME: "moviestreamingdb"
  
  # Redis Configuration
  SPRING_DATA_REDIS_HOST: "redis-service"
  SPRING_DATA_REDIS_PORT: "6379"
  
  # ML Service URL
  ML_SERVICE_URL: "http://ml-service:5000"
  
  # Video Storage Paths
  VIDEO_UPLOAD_DIR: "/app/videos"
  VIDEO_PROCESSED_DIR: "/app/videos_processed"
  
  # Backend API URL for frontend
  VITE_API_URL: "http://localhost:8080"
  VITE_WS_URL: "ws://localhost:8080"
