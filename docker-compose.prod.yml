# Production Docker Compose - Uses pre-built images from Docker Hub
# Usage: docker-compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: movie-platform-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - movie-platform-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ML Recommendation Service 
  ml-service:
    image: ${DOCKERHUB_USERNAME}/movie-streaming-ml-service:latest
    container_name: movie-platform-ml-service
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://host.docker.internal:27017
      - MONGO_DB_NAME=moviestreamingdb
      - PORT=5000
      - N_COMPONENTS=15
      - MODEL_PATH=saved_models/recommender.pkl
      - LOG_LEVEL=INFO
    volumes:
      - ml-models:/app/saved_models
    networks:
      - movie-platform-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend
  frontend:
    image: ${DOCKERHUB_USERNAME}/movie-streaming-frontend:latest
    container_name: movie-platform-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - movie-platform-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Spring Boot Backend
  backend:
    image: ${DOCKERHUB_USERNAME}/movie-streaming-backend:latest
    container_name: movie-platform-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database (connecting to host's local MongoDB)
      - MONGODB_URI=mongodb://host.docker.internal:27017/moviestreamingdb
      
      # Redis
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      
      # ML Service
      - ML_SERVICE_URL=http://ml-service:5000
      
      # Video Storage (Docker paths)
      - VIDEO_UPLOAD_DIR=/app/videos
      - VIDEO_PROCESSED_DIR=/app/videos_processed
      
      # JWT Secret
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-256-bit-key-change-this-before-deployment}
      
      # Firebase Configuration
      - FIREBASE_TYPE=${FIREBASE_TYPE}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY_ID=${FIREBASE_PRIVATE_KEY_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_CLIENT_ID=${FIREBASE_CLIENT_ID}
      - FIREBASE_AUTH_URI=${FIREBASE_AUTH_URI}
      - FIREBASE_TOKEN_URI=${FIREBASE_TOKEN_URI}
      - FIREBASE_AUTH_PROVIDER_X509_CERT_URL=${FIREBASE_AUTH_PROVIDER_X509_CERT_URL}
      - FIREBASE_CLIENT_X509_CERT_URL=${FIREBASE_CLIENT_X509_CERT_URL}
      - FIREBASE_UNIVERSE_DOMAIN=${FIREBASE_UNIVERSE_DOMAIN}
    volumes:
      - ./BACKEND/videos:/app/videos
      - ./BACKEND/videos_processed:/app/videos_processed
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - movie-platform-network
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep '[j]ava -jar' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# Named Volumes for Data Persistence
volumes:
  redis-data:
    driver: local
  ml-models:
    driver: local

# Custom Network
networks:
  movie-platform-network:
    driver: bridge
